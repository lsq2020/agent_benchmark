services:
  - type: web
    name: benchmark-hub
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        fromDatabase:
          name: benchmark-hub-db
          property: connectionString
      - key: TABLE_NAME
        value: benchmark_questions

databases:
  - name: benchmark-hub-db
    databaseName: benchmark_hub
    user: benchmark_hub
